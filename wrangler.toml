name = "sweet-lease-keeper"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Worker entry point — output by `npm run build` (Nitro cloudflare-module preset)
main = ".output/server/index.mjs"

# Serve static assets (JS, CSS, fonts, images) from .output/public
[assets]
binding = "ASSETS"
directory = ".output/public"

[[rules]]
type = "ESModule"
globs = ["**/*.mjs", "**/*.js"]
